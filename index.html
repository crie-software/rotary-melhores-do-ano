<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotary - Melhores do Ano 2025</title>
  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%;
      overflow: hidden; background-color: #042a55;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    iframe {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; border: none; z-index: 1;
    }

    /* Botão Flutuante */
    .btn-fallback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      background-color: #f86218;
      color: white;
      padding: 18px 25px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .btn-fallback span { font-size: 16px; }
    .btn-fallback small { font-size: 11px; opacity: 0.8; font-weight: normal; }

    .btn-fallback:active { transform: translate(-50%, -50%) scale(0.95); }
    
    /* Classe para esconder o botão */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <iframe 
    id="meuApp"
    src="https://script.google.com/macros/s/AKfycbyiTSilOZ97s3kMb6kdzVLvdzXBby2XvdMUDctjzMNBHmIozKvUL22lW3OyTk_eRMQtOA/exec"
    allowfullscreen="true">
  </iframe>

  <a href="https://script.google.com/macros/s/AKfycbyiTSilOZ97s3kMb6kdzVLvdzXBby2XvdMUDctjzMNBHmIozKvUL22lW3OyTk_eRMQtOA/exec" 
     id="btnOpen"
     target="_blank" 
     rel="noopener noreferrer"
     class="btn-fallback"
     onclick="handleExit()">
     <span>🚀 ABRIR PORTAL COMPLETO</span>
     <small>Clique para sair do Instagram e usar o Chrome/Safari</small>
  </a>

  <script>
    function handleExit() {
      // 1. Faz o botão desaparecer imediatamente
      document.getElementById('btnOpen').classList.add('hidden');
      
      // 2. Tenta uma pequena "forçada" para o navegador externo
      // O target="_blank" já cuida disso na maioria dos Androids/iOS
      console.log("Redirecionando para navegador externo...");
    }
  </script>

</body>
</html>
